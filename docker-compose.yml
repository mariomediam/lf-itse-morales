services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: morales_backend_dev
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.dev  # ← Usar variables de desarrollo
    depends_on:
      db:
        condition: service_healthy
    stdin_open: true
    tty: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: morales_frontend_dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      backend:
        condition: service_started
    stdin_open: true
    tty: true

  db:
    image: postgres:17.9-alpine
    container_name: morales_db_dev
    env_file:
      - ./backend/.env.dev  # ← Usar variables de desarrollo
    volumes:
      - morales_postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  morales_postgres_data_dev: